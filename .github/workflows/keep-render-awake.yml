name: Keep Render Awake

on:
  schedule:
    # Every 1 minute, 24/7
    - cron: '* * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ secrets.RENDER_HEALTH_URL || 'https://vidyaprayag-api.onrender.com/api/v1/health' }})
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Server returned $STATUS"
          fi
