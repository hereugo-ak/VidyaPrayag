<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Enroll mark">
  <!-- Enroll+ mark on a deep navy card — favicon / app-icon / embossed-on-black usage. No "+" in the mark. -->
  <defs>
    <linearGradient id="ep-span-d" x1="14" y1="42" x2="50" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B7EE8"/>
      <stop offset="0.5" stop-color="#B7AEF5"/>
      <stop offset="1" stop-color="#8B7EE8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="16" fill="#1A1838"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" stroke="#ffffff" stroke-opacity="0.08"/>

  <path d="M16 42 Q32 16 48 42" stroke="url(#ep-span-d)" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M14 46 H50" stroke="#ffffff" stroke-width="3.8" stroke-linecap="round"/>

  <path d="M22 38.2 V46" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M32 26   V46" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M42 38.2 V46" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.9" stroke-linecap="round"/>

  <circle cx="16" cy="42" r="3" fill="#ffffff"/>
  <circle cx="48" cy="42" r="3" fill="#ffffff"/>

  <!-- apex node — solid, in lavender for premium contrast on the dark card -->
  <circle cx="32" cy="24" r="3.6" fill="#E6E6FA"/>
</svg>
