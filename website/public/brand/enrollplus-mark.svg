<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Enroll mark">
  <!--
    Enroll+ mark — the "Span".
    Evolution of the mobile app's "Setu" bridge mark (VLogo.kt / VBrandLogo.kt):
    a parabolic span arcing between two grounded pillars over a deck, signalling
    the connection between school and home — infrastructure, not classroom imagery.

    $100M redesign: redrawn on a strict 64-unit grid as a precise monoline system.
    The "+" keystone is removed; the apex resolves to a single solid node — the
    true terminus of the centre cable, exactly as the app's original centre dot.
    The lavender #E6E6FA family is used with restraint (plate + span gradient only).
    Recognisable at 16x16, premium at 400x400.
  -->
  <defs>
    <linearGradient id="ep-span" x1="14" y1="42" x2="50" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#544AB8"/>
      <stop offset="0.5" stop-color="#6C5CE0"/>
      <stop offset="1" stop-color="#544AB8"/>
    </linearGradient>
  </defs>

  <!-- soft lavender plate (used with restraint — the only fill) -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="#E6E6FA"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" stroke="#26234D" stroke-opacity="0.06"/>

  <!-- the span: a clean parabolic arc rising to the apex node -->
  <path d="M16 42 Q32 16 48 42" stroke="url(#ep-span)" stroke-width="3.6" stroke-linecap="round"/>

  <!-- the deck baseline (the grounding) -->
  <path d="M14 46 H50" stroke="#26234D" stroke-width="3.8" stroke-linecap="round"/>

  <!-- three suspension cables stepping up toward the apex -->
  <path d="M22 38.2 V46" stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M32 26   V46" stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>
  <path d="M42 38.2 V46" stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>

  <!-- grounded pillar caps -->
  <circle cx="16" cy="42" r="3" fill="#26234D"/>
  <circle cx="48" cy="42" r="3" fill="#26234D"/>

  <!-- apex node — the keystone, a single solid node (no "+") -->
  <circle cx="32" cy="24" r="3.6" fill="#26234D"/>
</svg>
