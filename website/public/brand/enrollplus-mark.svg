<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Enroll+ mark">
  <!--
    Enroll+ mark, the "Setu" bridge.
    This is the EXACT mobile-app mark (composeApp/.../ui/v2/components/VBrandLogo.kt
    → drawBridge): a quadratic span arcing between two grounded pillar caps over a
    deck, three suspension cables and a solid apex node, the connection between
    school and home (infrastructure, not classroom imagery).

    The geometry is the app's 56-unit bridge scaled 1:1 into a centred 64-unit
    plate (+4,+4). Only the COLOUR changes: the app's teal accent → the website's
    lavender / violet system (#6C5CE0 family) on a restrained lavender plate, with
    navy ink (#26234D) for deck, cables and pillars. The "+" lives only in the
    wordmark text, never the symbol. Recognisable at 16x16, premium at 400x400.
  -->
  <defs>
    <linearGradient id="ep-span" x1="16" y1="36" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#544AB8"/>
      <stop offset="0.5" stop-color="#6C5CE0"/>
      <stop offset="1" stop-color="#544AB8"/>
    </linearGradient>
  </defs>

  <!-- restrained lavender plate (the only fill) -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="#E6E6FA"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" stroke="#26234D" stroke-opacity="0.06"/>

  <!-- the span: quadratic bridge arc (app M12 32 Q28 12 44 32 → +4,+4) -->
  <path d="M16 36 Q32 16 48 36" stroke="url(#ep-span)" stroke-width="3.4" stroke-linecap="round"/>

  <!-- the deck baseline (app M10 40 H46 → +4,+4) -->
  <path d="M14 44 H50" stroke="#26234D" stroke-width="4" stroke-linecap="round"/>

  <!-- three suspension cables (app x=18/28/38 → 22/32/42); centre reaches the apex -->
  <path d="M22 36 V44" stroke="#26234D" stroke-opacity="0.78" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M32 26 V44" stroke="#26234D" stroke-opacity="0.78" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M42 36 V44" stroke="#26234D" stroke-opacity="0.78" stroke-width="1.8" stroke-linecap="round"/>

  <!-- grounded pillar caps (app (12,32)/(44,32) → (16,36)/(48,36)) -->
  <circle cx="16" cy="36" r="2.9" fill="#26234D"/>
  <circle cx="48" cy="36" r="2.9" fill="#26234D"/>

  <!-- apex node (app (28,22) → (32,26)), the accent keystone, no "+" -->
  <circle cx="32" cy="26" r="3" fill="#6C5CE0"/>
</svg>
