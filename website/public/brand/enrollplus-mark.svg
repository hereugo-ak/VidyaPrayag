<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Enroll+ mark">
  <!--
    Enroll+ mark — the "Span".
    Evolution of the mobile app's "Setu" bridge mark (VLogo.kt / VBrandLogo.kt):
    an arc spanning two grounded pillars over a deck, signalling the connection
    between school and home. Redrawn on a strict 64-unit grid: a single-stroke
    parabolic span, three suspension cables stepping up to a navy keystone node
    that doubles as the "+" of Enroll+. Geometry is identical across every
    lockup so it stays byte-recognisable from 16px to 400px.
  -->
  <defs>
    <linearGradient id="ep-span" x1="12" y1="40" x2="52" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#544AB8"/>
      <stop offset="0.5" stop-color="#6C5CE0"/>
      <stop offset="1" stop-color="#544AB8"/>
    </linearGradient>
  </defs>

  <!-- soft lavender plate (used with restraint — the only fill) -->
  <rect x="2" y="2" width="60" height="60" rx="17" fill="#E6E6FA"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="16.5" stroke="#26234D" stroke-opacity="0.06"/>

  <!-- the span: a clean parabolic arc -->
  <path d="M14 40 Q32 14 50 40" stroke="url(#ep-span)" stroke-width="3.4" stroke-linecap="round"/>

  <!-- the deck baseline -->
  <path d="M12 44 H52" stroke="#26234D" stroke-width="3.6" stroke-linecap="round"/>

  <!-- three suspension cables (stepping up to the keystone) -->
  <path d="M20 36.2 V44" stroke="#26234D" stroke-opacity="0.42" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M32 27 V44"   stroke="#26234D" stroke-opacity="0.42" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M44 36.2 V44" stroke="#26234D" stroke-opacity="0.42" stroke-width="1.8" stroke-linecap="round"/>

  <!-- grounded pillar caps -->
  <circle cx="14" cy="40" r="3" fill="#26234D"/>
  <circle cx="50" cy="40" r="3" fill="#26234D"/>

  <!-- keystone node = the "+" of Enroll+ -->
  <path d="M32 21.5 V32.5 M26.5 27 H37.5" stroke="#26234D" stroke-width="3.4" stroke-linecap="round"/>
</svg>
