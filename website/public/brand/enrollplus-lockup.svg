<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 64" fill="none" role="img" aria-label="Enroll+">
  <!-- Enroll+ FULL lockup — mark + "Enroll+" wordmark side by side. Mark has no "+". -->
  <defs>
    <linearGradient id="ep-span-f" x1="14" y1="42" x2="50" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#544AB8"/>
      <stop offset="0.5" stop-color="#6C5CE0"/>
      <stop offset="1" stop-color="#544AB8"/>
    </linearGradient>
  </defs>
  <!-- mark -->
  <g>
    <rect x="2" y="2" width="60" height="60" rx="18" fill="#E6E6FA"/>
    <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" stroke="#26234D" stroke-opacity="0.06"/>
    <path d="M16 42 Q32 16 48 42" stroke="url(#ep-span-f)" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M14 46 H50" stroke="#26234D" stroke-width="3.8" stroke-linecap="round"/>
    <path d="M22 38.2 V46" stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M32 26 V46"   stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>
    <path d="M42 38.2 V46" stroke="#26234D" stroke-opacity="0.38" stroke-width="1.9" stroke-linecap="round"/>
    <circle cx="16" cy="42" r="3" fill="#26234D"/>
    <circle cx="48" cy="42" r="3" fill="#26234D"/>
    <circle cx="32" cy="24" r="3.6" fill="#26234D"/>
  </g>
  <!-- wordmark -->
  <text x="80" y="42" font-family="'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif"
        font-size="34" font-weight="800" letter-spacing="-1.2" fill="#1A1838">Enroll<tspan fill="#6C5CE0">+</tspan></text>
</svg>
